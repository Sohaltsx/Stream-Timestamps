<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stream Timestamps</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f0e;
      --surface: #141714;
      --surface2: #1b1f1a;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --green: #3dffa0;
      --green-dim: #1a6644;
      --green-glow: rgba(61,255,160,0.12);
      --red: #ff4f4f;
      --text: #e8ede9;
      --text2: #7a8c7c;
      --text3: #3d4d3e;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .container { width: 100%; max-width: 640px; }

    /* header */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .title-block {}
    .title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 4px;
    }
    .subtitle { font-size: 13px; color: var(--text2); font-weight: 300; }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px;
      border: 1px solid var(--border2);
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text2);
      transition: all 0.3s;
    }
    .live-pill.active {
      border-color: var(--green-dim);
      color: var(--green);
      background: var(--green-glow);
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text3);
      transition: background 0.3s;
    }
    .live-pill.active .live-dot {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 1.4s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* clock */
    .clock-block {
      text-align: center;
      margin-bottom: 2rem;
    }
    .clock {
      font-family: var(--mono);
      font-size: clamp(48px, 12vw, 72px);
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
      transition: color 0.3s;
    }
    .clock.active { color: var(--green); text-shadow: 0 0 40px rgba(61,255,160,0.3); }
    .clock-hint {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.15em;
    }

    /* stream controls */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .btn {
      padding: 12px 16px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
    }
    .btn:hover { background: var(--surface2); color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn:active { transform: scale(0.98); }
    .btn.primary {
      background: var(--green-glow);
      border-color: var(--green-dim);
      color: var(--green);
    }
    .btn.primary:hover { background: rgba(61,255,160,0.18); }
    .btn.danger { border-color: rgba(255,79,79,0.3); color: #ff7a7a; }
    .btn.danger:hover { background: rgba(255,79,79,0.08); }

    /* stamp input */
    .stamp-section { margin-bottom: 2rem; }
    .stamp-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .note-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 11px 14px;
      font-family: var(--sans);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .note-input::placeholder { color: var(--text3); }
    .note-input:focus { border-color: var(--green-dim); }
    .btn-stamp {
      padding: 11px 20px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-weight: 500;
    }
    .btn-stamp:hover { background: var(--green-glow); border-color: var(--green-dim); color: var(--green); }
    .btn-stamp:active { transform: scale(0.97); }
    .hotkey-hint {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.05em;
    }
    kbd {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 1px 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text2);
    }

    /* flash feedback */
    .flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: var(--green-glow);
      border: 1px solid var(--green-dim);
      border-radius: 8px;
      padding: 12px 24px;
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--green);
      pointer-events: none;
      opacity: 0;
      z-index: 200;
      transition: none;
    }
    .flash.show {
      animation: flashAnim 0.7s ease forwards;
    }
    @keyframes flashAnim {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.05); }
    }

    /* log */
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .log-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text2);
    }
    .log-actions { display: flex; gap: 10px; }
    .btn-link {
      background: none;
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: color 0.15s;
    }
    .btn-link:hover { color: var(--green); }

    .log-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      animation: slideIn 0.2s ease;
      transition: border-color 0.15s;
    }
    .log-item:hover { border-color: var(--border2); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ts-num {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      min-width: 20px;
    }
    .ts-badge {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
      white-space: nowrap;
      letter-spacing: 0.05em;
    }
    .ts-sep {
      width: 1px; height: 16px;
      background: var(--border2);
      flex-shrink: 0;
    }
    .ts-note {
      font-size: 13px;
      color: var(--text);
      flex: 1;
      font-weight: 300;
    }
    .ts-note.empty { color: var(--text3); font-style: italic; }
    .ts-del {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
      transition: color 0.15s;
    }
    .ts-del:hover { color: var(--red); }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text3);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      border: 1px dashed var(--border2);
      border-radius: 6px;
    }

    /* footer */
    .footer {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.08em;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="container">

  <div class="header">
    <div class="title-block">
      <div class="title">⬡ Stream Timestamps</div>
      <div class="subtitle">Mark moments while you stream, export for editing</div>
    </div>
    <div class="live-pill" id="live-pill">
      <div class="live-dot" id="live-dot"></div>
      <span id="live-label">OFFLINE</span>
    </div>
  </div>

  <div class="clock-block">
    <div class="clock" id="clock">00:00:00</div>
    <div class="clock-hint" id="clock-hint">STREAM TIMER — NOT STARTED</div>
  </div>

  <div class="controls">
    <button class="btn primary" id="btn-start" onclick="startStream()">▶ START TIMER</button>
    <button class="btn danger" id="btn-stop" onclick="stopStream()">■ STOP</button>
  </div>

  <div class="stamp-section">
    <div class="stamp-row">
      <input class="note-input" id="note-input" type="text" placeholder="Add a note (e.g. clutch play, funny moment)..." maxlength="120"/>
      <button class="btn-stamp" id="btn-add" onclick="addStamp()">⏱ MARK</button>
    </div>
    <div class="hotkey-hint">
      Quick mark: <kbd>Space</kbd> or <kbd>M</kbd> &nbsp;·&nbsp; Clear note: <kbd>Esc</kbd>
    </div>
  </div>

  <div class="log-header">
    <span class="log-label" id="count-label">— timestamps</span>
    <div class="log-actions">
      <button class="btn-link" onclick="clearAll()">Clear all</button>
      <button class="btn-link" onclick="exportLog()">Export .txt</button>
      <button class="btn-link" onclick="exportCSV()">Export .csv</button>
    </div>
  </div>

  <ul class="log-list" id="log-list">
    <li class="empty-state">No timestamps yet — start the timer and press Space to mark</li>
  </ul>

  <div class="footer">stream-timestamps.html &nbsp;·&nbsp; press space to mark · export when done</div>
</div>

<script>
  let streamStart = null;
  let clockInterval = null;
  let stamps = [];
  let streaming = false;
  let counter = 0;

  function pad(n){ return String(n).padStart(2,'0'); }

  function formatDuration(ms){
    let s = Math.floor(ms/1000);
    let m = Math.floor(s/60); s = s%60;
    let h = Math.floor(m/60); m = m%60;
    return pad(h)+':'+pad(m)+':'+pad(s);
  }

  function getStreamTime(){
    if(!streamStart) return '00:00:00';
    return formatDuration(Date.now() - streamStart);
  }

  function updateClock(){
    document.getElementById('clock').textContent = getStreamTime();
  }

  function startStream(){
    if(streaming) return;
    streamStart = Date.now();
    streaming = true;
    clockInterval = setInterval(updateClock, 500);
    document.getElementById('clock').classList.add('active');
    document.getElementById('live-pill').classList.add('active');
    document.getElementById('live-label').textContent = 'LIVE';
    document.getElementById('clock-hint').textContent = 'STREAM TIMER RUNNING';
  }

  function stopStream(){
    if(!streaming) return;
    streaming = false;
    clearInterval(clockInterval);
    document.getElementById('clock').classList.remove('active');
    document.getElementById('live-pill').classList.remove('active');
    document.getElementById('live-label').textContent = 'STOPPED';
    document.getElementById('clock-hint').textContent = 'STREAM ENDED AT ' + getStreamTime();
  }

  function showFlash(ts){
    const el = document.getElementById('flash');
    el.textContent = ts;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
  }

  function addStamp(){
    if(!streamStart){
      alert('Start the stream timer first!');
      return;
    }
    const ts = getStreamTime();
    const note = document.getElementById('note-input').value.trim();
    counter++;
    const stamp = { ts, note, id: Date.now(), num: counter };
    stamps.unshift(stamp);
    document.getElementById('note-input').value = '';
    renderList();
    showFlash(ts);
  }

  function removeStamp(id){
    stamps = stamps.filter(s => s.id !== id);
    renderList();
  }

  function clearAll(){
    if(stamps.length === 0) return;
    if(confirm('Clear all ' + stamps.length + ' timestamps?')){
      stamps = [];
      counter = 0;
      renderList();
    }
  }

  function renderList(){
    const list = document.getElementById('log-list');
    const n = stamps.length;
    document.getElementById('count-label').textContent = n + ' timestamp' + (n !== 1 ? 's' : '');
    if(n === 0){
      list.innerHTML = '<li class="empty-state">No timestamps yet — start the timer and press Space to mark</li>';
      return;
    }
    list.innerHTML = stamps.map((s, i) =>
      `<li class="log-item">
        <span class="ts-num">${String(n - i).padStart(2,'0')}</span>
        <span class="ts-badge">${s.ts}</span>
        <span class="ts-sep"></span>
        <span class="ts-note${s.note ? '' : ' empty'}">${s.note ? escHtml(s.note) : 'no note'}</span>
        <button class="ts-del" onclick="removeStamp(${s.id})" title="Remove">×</button>
      </li>`
    ).join('');
  }

  function escHtml(str){
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function exportLog(){
    if(stamps.length === 0){ alert('No timestamps to export.'); return; }
    const date = new Date().toLocaleDateString('en-GB').replace(/\//g,'-');
    const lines = [
      'STREAM TIMESTAMPS',
      '================',
      'Exported: ' + new Date().toLocaleString(),
      '',
      ...([...stamps].reverse().map((s, i) =>
        `[${s.ts}]  ${s.note || '(no note)'}`
      ))
    ];
    download('stream-timestamps-' + date + '.txt', lines.join('\n'), 'text/plain');
  }

  function exportCSV(){
    if(stamps.length === 0){ alert('No timestamps to export.'); return; }
    const date = new Date().toLocaleDateString('en-GB').replace(/\//g,'-');
    const rows = [
      ['#','Timestamp','Note'],
      ...[...stamps].reverse().map((s, i) =>
        [i+1, s.ts, s.note || '']
      )
    ];
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    download('stream-timestamps-' + date + '.csv', csv, 'text/csv');
  }

  function download(filename, content, type){
    const blob = new Blob([content], { type });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  document.addEventListener('keydown', function(e){
    const tag = document.activeElement.tagName;
    if(e.key === 'Escape'){
      e.preventDefault();
      document.getElementById('note-input').value = '';
      document.getElementById('note-input').blur();
      return;
    }
    if(tag === 'INPUT' || tag === 'TEXTAREA') return;
    if(e.code === 'Space' || e.key === 'm' || e.key === 'M'){
      e.preventDefault();
      addStamp();
    }
  });
</script>
</body>
</html>
